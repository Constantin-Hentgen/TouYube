<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style_form.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <title>Inscription</title>
</head>
<body>
    <form>
        <h1>Inscription</h1>
        <div>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname" value="Dev"><br>
        </div>
        <div>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname" value="Loper">
        </div>
        <h4>Select your sex :</h4>
        <div>
            <input type="checkbox" id="sex" name="sex" value="I'm a Man'">
            <label for="sex"> I'm a Man</label><br>
            <input type="checkbox" id="sex2" name="sex2" value="I'm a Woman">
            <label for="sex2"> I'm a Woman</label><br>
            <input type="checkbox" id="sex3" name="sex3" value="I don't Exist">
            <label for="sex3"> I don't Exist</label>
        </div>
        <div>
            <label for="birthday">Birthday:</label>
            <input type="date" id="birthday" name="birthday">
        </div>
        <div>
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" value="email@domain.web">
        </div>
        <div>
            <label for="myfile">Select your profile picture:</label>
            <input type="file" id="myfile" name="myfile">
        </div>
        <div>
            <label for="phone">Enter your phone number:</label>
            <input type="tel" id="phone" name="phone" value="00.00.00.00.00" pattern="[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}">
        </div>
        <div>
            <label for="favcolor">Select your favorite color:</label>
            <input type="color" id="favcolor" name="favcolor">
        </div>
        <input type="submit" value="Submit">
    </form>

</body>

</html>

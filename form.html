<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style_form.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/jpg" href="touyube.png" />
    <title>Formulaire/tableau</title>
</head>

<body>
    <form>
        <h1>Formulaire construit dans un tableau</h1>     
        <table>
            <tr>
                <th>
                    <label for="fname">Prénom :</label>
                </th>
                <th>
                    <input type="text" id="fname" name="fname" placeholder="Dev">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="lname">Nom de famille :</label>
                </th>
                <th>
                    <input type="text" id="lname" name="lname" placeholder="Loper">
                </th>
            </tr>
            <tr>
                <th>
                    <h4>Sélectionner un sexe :</h4>
                </th>
                <th>
                    <input type="radio" id="man" name="sex" placeholder="man'">
                    <label for="sex"> Homme</label>
                    <input type="radio" id="woman" name="sex" placeholder="woman">
                    <label for="sex2"> Femme</label>
                </th>
            </tr>
            <tr>
                <th>
                    <h4>Les langages que j'aime :</h4>
                </th>
                <th>
                    <input type="checkbox" id="html" name="fav_language" value="HTML">
                    <label for="html">HTML</label>
                    <input type="checkbox" id="css" name="fav_language" value="CSS">
                    <label for="css">CSS</label>
                    <input type="checkbox" id="javascript" name="fav_language" value="JavaScript">
                    <label for="javascript">JavaScript</label>
                </th>
            </tr>
            <tr>
                <th>
                    <label for="birthday">Date d'anniversaire :</label>
                </th>
                <th>
                    <input type="date" id="birthday" name="birthday">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="email">Adresse e-mail :</label>
                </th>
                <th>
                    <input type="email" id="email" name="email" placeholder="email@domain.web">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="myfile">Choisir une image de profil :</label>
                </th>
                <th>
                    <input type="file" id="myfile" name="myfile">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="phone">Numéro de téléphone :</label>
                </th>
                <th>
                    <input type="tel" id="phone" name="phone" placeholder="00.00.00.00.00"
                        pattern="[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="favcolor">Ma couleur préférée :</label>
                </th>
                <th>
                    <input type="color" id="favcolor" name="favcolor">
                </th>
            </tr>
        </table>
        <a id='fake_submit' href="index.html">Envoyer</a>
    </form>

</body>

</html>

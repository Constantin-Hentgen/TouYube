<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style_form.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/jpg" href="youtube.png" />
    <title>Inscription</title>
</head>

<body>
    <form>
        <h1>Inscription</h1>   
        <hr>     
        <table>
            <tr>
                <th>
                    <label for="fname">First name:</label>
                </th>
                <th>
                    <input type="text" id="fname" name="fname" placeholder="Dev">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="lname">Last name:</label>
                </th>
                <th>
                    <input type="text" id="lname" name="lname" placeholder="Loper">
                </th>
            </tr>
            <tr>
                <th>
                    <h4>Select your sex :</h4>
                </th>
                <th>
                    <input type="checkbox" id="man" name="sex" placeholder="man'">
                    <label for="sex"> I'm a Man</label>
                    <input type="checkbox" id="woman" name="sex" placeholder="woman">
                    <label for="sex2"> I'm a Woman</label>
                </th>
            </tr>
            <tr>
                <th>
                    <h4>Select your favorite Web language :</h4>
                </th>
                <th>
                    <input type="radio" id="html" name="fav_language" value="HTML">
                    <label for="html">HTML</label>
                    <input type="radio" id="css" name="fav_language" value="CSS">
                    <label for="css">CSS</label>
                    <input type="radio" id="javascript" name="fav_language" value="JavaScript">
                    <label for="javascript">JavaScript</label>
                </th>
            </tr>
            <tr>
                <th>
                    <label for="birthday">Birthday:</label>
                </th>
                <th>
                    <input type="date" id="birthday" name="birthday">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="email">Enter your email:</label>
                </th>
                <th>
                    <input type="email" id="email" name="email" placeholder="email@domain.web">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="myfile">Select your profile picture:</label>
                </th>
                <th>
                    <input type="file" id="myfile" name="myfile">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="phone">Enter your phone number:</label>
                </th>
                <th>
                    <input type="tel" id="phone" name="phone" placeholder="00.00.00.00.00"
                        pattern="[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}.[0-9]{2}">
                </th>
            </tr>
            <tr>
                <th>
                    <label for="favcolor">Select your favorite color:</label>
                </th>
                <th>
                    <input type="color" id="favcolor" name="favcolor">
                </th>
            </tr>
        </table>
        <hr>
        <a id='fake_submit' href="index.html">Submit</a>
    </form>

</body>

</html>
